{% block title %}Set Password | Akako House{% endblock %}
{% block account_content %}<p class="eyebrow">Account security</p><h1>Set password</h1><p class="workspace-subtitle">Add a password to your account for email-and-password sign-in.</p><form method="post" action="{% url 'account_set_password' %}" class="portal-form">{% csrf_token %}{{ redirect_field }}{{ form.as_p }}<button class="button primary" type="submit" name="action">Set Password</button></form>{% endblock %}
